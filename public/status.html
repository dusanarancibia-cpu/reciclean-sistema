<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 STATUS · Reciclean-Farex</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --accent: #22c55e;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #334155;
    --link: #60a5fa;
    --hover: #2d3e52;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 20px;
    line-height: 1.5;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--panel);
    border-radius: 8px;
  }
  .topbar h1 {
    margin: 0;
    font-size: 20px;
  }
  .topbar .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 8px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.9; }
  .btn-secondary { background: #475569; }
  .btn-wa { background: #25d366; }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  #content {
    background: var(--panel);
    padding: 24px 28px;
    border-radius: 8px;
    overflow-x: auto;
  }
  #content h1 { font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  #content h2 { font-size: 19px; margin-top: 24px; color: var(--accent); }
  #content h3 { font-size: 16px; margin-top: 18px; color: #fbbf24; }
  #content table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0;
    font-size: 13px;
  }
  #content th, #content td {
    border: 1px solid var(--border);
    padding: 8px 10px;
    text-align: left;
  }
  #content th {
    background: #0b1222;
    font-weight: 600;
  }
  #content tr:hover { background: var(--hover); }
  #content code {
    background: #0b1222;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 12px;
  }
  #content pre {
    background: #0b1222;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
  }
  #content a { color: var(--link); text-decoration: none; }
  #content a:hover { text-decoration: underline; }
  #content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    color: var(--muted);
    margin: 12px 0;
  }
  #content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }
  .error {
    background: #7f1d1d;
    padding: 16px;
    border-radius: 8px;
    color: #fecaca;
  }
  .meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
    text-align: center;
  }
  @media (max-width: 640px) {
    body { padding: 10px; }
    #content { padding: 16px; font-size: 14px; }
    #content table { font-size: 11px; }
    #content th, #content td { padding: 6px 4px; }
    .topbar h1 { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1>📊 STATUS · Reciclean-Farex</h1>
    <div class="actions">
      <a class="btn" href="agregar-tema.html">+ Agregar tema</a>
      <button class="btn btn-secondary" onclick="location.reload()">🔄 Refrescar</button>
      <a class="btn btn-wa" href="https://wa.me/56961926365?text=status" target="_blank">📱 Diego</a>
    </div>
  </div>

  <div class="loading" id="loading">Cargando status desde GitHub…</div>
  <div id="content" style="display:none"></div>
  <div class="meta" id="meta"></div>
</div>

<script>
  const RAW_URL = 'https://raw.githubusercontent.com/dusanarancibia-cpu/reciclean-sistema/main/STATUS.md';

  mermaid.initialize({
    theme: 'dark',
    startOnLoad: false,
    securityLevel: 'loose',
    themeVariables: {
      background: '#1e293b',
      primaryColor: '#22c55e',
      primaryTextColor: '#f1f5f9',
      primaryBorderColor: '#334155',
      lineColor: '#94a3b8'
    }
  });

  async function loadStatus() {
    try {
      const resp = await fetch(RAW_URL + '?t=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const md = await resp.text();

      // Render markdown
      const html = marked.parse(md);
      const content = document.getElementById('content');
      content.innerHTML = html;

      // Render Mermaid blocks
      const mermaidBlocks = content.querySelectorAll('pre > code.language-mermaid, code.language-mermaid');
      for (let i = 0; i < mermaidBlocks.length; i++) {
        const block = mermaidBlocks[i];
        const code = block.textContent;
        const id = 'mermaid-' + i;
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.id = id;
        div.textContent = code;
        const pre = block.parentElement;
        if (pre && pre.tagName === 'PRE') {
          pre.replaceWith(div);
        } else {
          block.replaceWith(div);
        }
      }
      await mermaid.run({ querySelector: '.mermaid' });

      document.getElementById('loading').style.display = 'none';
      content.style.display = 'block';
      document.getElementById('meta').textContent = 'Fuente: STATUS.md en GitHub · cargado ' + new Date().toLocaleString('es-CL');
    } catch (err) {
      document.getElementById('loading').innerHTML =
        '<div class="error">Error cargando status: ' + err.message +
        '<br><br>Intenta <a href="' + RAW_URL + '" style="color:#fecaca">ver raw directamente</a>.</div>';
    }
  }

  loadStatus();
</script>
</body>
</html>
