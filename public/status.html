{c:'I-23',p:null,pct:15,a:'Gerencia General',r:'Dusan',t:'Monday implement',ti:'3h',e:false,dep:[],del:null,b:'diseno',sig:'Decidir Monday vs tracker interno post 30-abr',ruta:['Claude Code/Documentacion/Monday_Guia_Implementacion_Reciclean.pptx'],fl:null},
{c:'I-24',p:null,pct:20,a:'Recursos Humanos',r:'Dusan',t:'Descripción cargos',ti:'2h',e:false,dep:[],del:'Ingrid',b:'spec',sig:'Consolidar descripciones 3 cargos + aprobar con equipo',ruta:['equipo-procesos/Cesar Mora/Descripcion de cargo/Descripción Asistente Comercial.docx'],fl:null},
{c:'I-25',p:null,pct:30,a:'Legal y Compliance',r:'Dusan',t:'Permisos Talca',ti:'3h',e:false,dep:[],del:'Ingrid',b:'spec',sig:'Revisar vigencia cada permiso + fechas renovación',ruta:['Permisos y Resoluciones/Permisos de Talca/20230710142 Resolucion Exenta SEA.pdf'],fl:null}
];
const BL={diseno:'💡 Diseño',spec:'📋 Spec',build:'🔨 Build',validado:'🧪 Validado',revision:'🔍 Revisión',superado:'✅ Superado'};
const BC={diseno:'bd',spec:'bs',build:'bb',validado:'bv',revision:'br',superado:'bx'};
const PC=p=>p>=80?'#4ade80':p>=60?'#2dd4bf':p>=40?'#fb923c':p>=20?'#fbbf24':'#f87171';
const TOD='2026-04-22';
let sC=null,sA=true,showS=false,fT='',fAr='',fRs='',fBn='',fEj=false;

function bldSel(){
  const a=[...new Set(T.filter(t=>!t.p).map(t=>t.a))].sort();
  const r=[...new Set(T.map(t=>t.r))].sort();
  const b=['diseno','spec','build','validado','revision','superado'];
  const sl=(id,v,lb)=>{const s=document.getElementById(id);v.forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=lb?BL[x]:x;s.appendChild(o);});};
  sl('fA',a,false);sl('fR',r,false);sl('fB',b,true);
}

function kids(pc){return T.filter(t=>t.p===pc);}

function match(t){
  const tx=fT.toLowerCase();
  if(tx&&![t.c,t.t,t.r,t.a,t.sig||'',t.b].some(v=>v&&v.toLowerCase().includes(tx)))return false;
  if(fAr&&t.a!==fAr)return false;
  if(fRs&&t.r!==fRs)return false;
  if(fBn&&t.b!==fBn)return false;
  if(fEj&&!t.e)return false;
  return true;
}

function bar(pct){
  return `<div class="pw"><div class="pb"><div class="pf" style="width:${pct}%;background:${PC(pct)}"></div></div><span class="pn">${pct}%</span></div>`;
}

function fld(fl){
  if(!fl)return '<span class="fl">—</span>';
  const d=new Date(fl),df=Math.round((d-new Date(TOD))/86400000);
  const lb=`${d.getDate()}-${'ene,feb,mar,abr,may,jun,jul,ago,sep,oct,nov,dic'.split(',')[d.getMonth()]}`;
  if(df<0)return `<span class="fl v" title="Vencida hace ${-df}d">⚠️ ${lb}</span>`;
  if(df<=3)return `<span class="fl p" title="${df}d restantes">⏰ ${lb}</span>`;
  return `<span class="fl">${lb}</span>`;
}

function sv(t,c){
  if(c==='c')return t.c;if(c==='pct')return t.pct;if(c==='a')return t.a||'';
  if(c==='r')return t.r||'';if(c==='t')return t.t||'';if(c==='ti')return t.ti||'';
  if(c==='e')return t.e?1:0;if(c==='dep')return(t.dep||[]).join();
  if(c==='del')return t.del||'';if(c==='b')return t.b||'';
  if(c==='sig')return t.sig||'';if(c==='fl')return t.fl||'9999';
  if(c==='ruta')return t.ruta?1:0;return '';
}

function rStats(){
  const par=T.filter(t=>!t.p);
  const avg=Math.round(par.reduce((s,t)=>s+t.pct,0)/par.length);
  document.getElementById('stats').innerHTML=`
    <span class="stat">Total <strong>${T.length}</strong></span>
    <span class="stat">Iniciativas <strong>${par.length}</strong></span>
    <span class="stat">🔥 Ejecutar <strong>${T.filter(t=>t.e).length}</strong></span>
    <span class="stat">🔗 Con deps <strong>${par.filter(t=>t.dep&&t.dep.length>0).length}</strong></span>
    <span class="stat">Avance <strong>${avg}%</strong></span>`;
}

function row(t,isSub){
  const ch=isSub?[]:kids(t.c);
  const hasC=ch.length>0;
  const tog=hasC?`<span class="ti2">▶</span>`:'<span style="width:14px;display:inline-block"></span>';
  const dh=(t.dep&&t.dep.length)?`<span class="dep">${t.dep.join(', ')}</span>`:'<span class="dep">—</span>';
  const rh=t.ruta&&t.ruta.length?`<span title="${t.ruta.join('\n')}">📁</span>`:'';
  const sh=t.sig?`<span class="sig" title="${t.sig.replace(/"/g,'&quot;')}">${t.sig}</span>`:'';
  const bh=`<span class="banda ${BC[t.b]||''}">${BL[t.b]||t.b}</span>`;
  const cod=isSub?`<span class="cod sc">${t.c}</span>`:`<span class="cod pc">${tog}${t.c}</span>`;
  return `<td>${cod}</td><td>${bar(t.pct)}</td><td><span class="ab" title="${t.a}">${t.a}</span></td><td><span class="resp">${t.r||'—'}</span></td><td><span class="tema">${t.t}</span></td><td><span class="ti">${t.ti||'—'}</span></td><td class="ej">${t.e?'🔥':'⏸️'}</td><td>${dh}</td><td><span class="del">${t.del||'—'}</span></td><td>${bh}</td><td>${sh}</td><td>${fld(t.fl)}</td><td class="ri">${rh}</td>`;
}

function render(){
  rStats();
  let par=T.filter(t=>!t.p);
  if(sC){par.sort((a,b)=>{const av=sv(a,sC),bv=sv(b,sC);if(av<bv)return sA?-1:1;if(av>bv)return sA?1:-1;return 0;});}
  const tb=document.getElementById('tbody');
  tb.innerHTML='';
  let vis=0;
  par.forEach(parent=>{
    const ch=kids(parent.c);
    if(!match(parent)&&!ch.some(k=>match(k)))return;
    vis++;
    const tr=document.createElement('tr');
    tr.className='pr'+(ch.length?' ex':'');
    tr.dataset.p=parent.c;
    if(ch.length&&showS)tr.classList.add('expanded');
    tr.innerHTML=row(parent,false);
    if(ch.length){tr.addEventListener('click',()=>{tr.classList.toggle('expanded');tb.querySelectorAll(`tr[data-s="${parent.c}"]`).forEach(r=>r.classList.toggle('vis'));});}
    tb.appendChild(tr);
    ch.forEach(kid=>{
      if(!match(kid)&&!match(parent))return;
      const kr=document.createElement('tr');
      kr.className='sr'+(showS?' vis':'');
      kr.dataset.s=parent.c;
      kr.innerHTML=row(kid,true);
      tb.appendChild(kr);
    });
  });
  document.getElementById('conteo').textContent=`${vis} iniciativas · ${T.filter(t=>t.p).length} sub-tareas`;
}

document.querySelectorAll('thead th[data-c]').forEach(th=>{
  th.addEventListener('click',()=>{
    const c=th.dataset.c;
    if(sC===c){sA=!sA;}else{sC=c;sA=true;}
    document.querySelectorAll('thead th').forEach(h=>h.classList.remove('sa','sd'));
    th.classList.add(sA?'sa':'sd');
    render();
  });
});
document.getElementById('buscar').addEventListener('input',e=>{fT=e.target.value;render();});
document.getElementById('fA').addEventListener('change',e=>{fAr=e.target.value;render();});
document.getElementById('fR').addEventListener('change',e=>{fRs=e.target.value;render();});
document.getElementById('fB').addEventListener('change',e=>{fBn=e.target.value;render();});
document.getElementById('fE').addEventListener('change',e=>{fEj=e.target.checked;render();});
document.getElementById('btnS').addEventListener('click',function(){
  showS=!showS;this.classList.toggle('active',showS);
  this.textContent=showS?'👁️ Ocultar sub-tareas':'👁️ Ver sub-tareas';
  render();
});
bldSel();render();
</script>
