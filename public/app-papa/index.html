<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Remedios">
  <link rel="manifest" href="manifest.json">
  <title>Remedios — Rigoberto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f4ff;
      color: #111827;
      font-size: 24px;
      line-height: 1.6;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 32px;
      text-align: center;
      color: #1a56db;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 4px solid #1a56db;
    }
    .seccion {
      background: #ffffff;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      border-left: 8px solid #1a56db;
    }
    .seccion.noche {
      border-left-color: #1e3a5f;
    }
    .seccion h2 {
      font-size: 32px;
      margin-bottom: 14px;
      color: #1a56db;
    }
    .seccion.noche h2 {
      color: #1e3a5f;
    }
    .gota {
      font-size: 24px;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
    }
    .gota:last-child { border-bottom: none; }
    .alerta {
      background: #fffbeb;
      border: 3px solid #f59e0b;
      border-radius: 14px;
      padding: 16px 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #78350f;
    }
    .retiro {
      background: #ecfdf5;
      border: 3px solid #10b981;
      border-radius: 14px;
      padding: 16px 20px;
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
      color: #064e3b;
    }
    .btn-audio {
      display: block;
      width: 100%;
      background: #1a56db;
      color: #ffffff;
      border: none;
      border-radius: 14px;
      padding: 22px 16px;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      min-height: 80px;
      text-align: center;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(26,86,219,0.4);
      transition: background 0.15s;
    }
    .btn-audio:active, .btn-audio.playing {
      background: #1440a8;
    }
    .estado-audio {
      text-align: center;
      font-size: 20px;
      color: #6b7280;
      margin-top: 10px;
      min-height: 28px;
    }
    audio { display: none; }
  </style>
</head>
<body>

  <h1>💊 Remedios de Rigoberto</h1>

  <div class="seccion">
    <h2>🌅 MAÑANA — 8:00</h2>
    <div class="gota">💧 <strong>Brimonidina</strong> → ojo izquierdo</div>
    <div class="gota">💧 <strong>Dorzolamida</strong> → ojo izquierdo</div>
    <div class="gota">💧 <strong>Timolol</strong> → ambos ojos</div>
  </div>

  <div class="alerta">
    ⏱ Esperar <strong>5 minutos</strong> entre gota y gota
  </div>

  <div class="seccion noche">
    <h2>🌙 NOCHE — 20:00</h2>
    <div class="gota">💧 <strong>Latanoprost</strong> → ambos ojos</div>
    <div class="gota">💧 <strong>Timolol</strong> → ambos ojos</div>
  </div>

  <div class="retiro">
    📅 Próximo retiro de remedios:<br>
    <strong>25 de mayo de 2026</strong><br>
    CRS Maipú
  </div>

  <button class="btn-audio" id="btn" onclick="toggleAudio()">
    🔊 ESCUCHAR INSTRUCCIONES
  </button>
  <div class="estado-audio" id="estado"></div>

  <audio id="audio" src="audio_instrucciones_v2_2026-04-23.ogg"></audio>

  <script>
    var audio = document.getElementById('audio');
    var btn = document.getElementById('btn');
    var estado = document.getElementById('estado');

    function toggleAudio() {
      if (audio.paused) {
        audio.play();
        btn.textContent = '⏹ DETENER';
        btn.classList.add('playing');
        estado.textContent = 'Reproduciendo...';
      } else {
        audio.pause();
        audio.currentTime = 0;
        btn.textContent = '🔊 ESCUCHAR INSTRUCCIONES';
        btn.classList.remove('playing');
        estado.textContent = '';
      }
    }

    audio.addEventListener('ended', function() {
      btn.textContent = '🔊 ESCUCHAR INSTRUCCIONES';
      btn.classList.remove('playing');
      estado.textContent = '✅ Listo';
      setTimeout(function() { estado.textContent = ''; }, 3000);
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
