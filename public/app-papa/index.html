<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Remedios - Don Rigoberto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f9f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 1.8rem 1.5rem 2rem;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            color: #2c5e2e;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #5a7c5c;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
        }
        .boton-audio {
            background: #e8f0e8;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #c8ddc8;
        }
        .boton-audio:hover {
            background: #d4e8d4;
            transform: scale(0.98);
        }
        .boton-titulo {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1e4620;
            margin-bottom: 0.3rem;
        }
        .boton-desc {
            font-size: 0.8rem;
            color: #5e7c5e;
        }
        audio {
            width: 100%;
            margin-top: 0.5rem;
            outline: none;
        }
        footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #8aa88a;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>💊 Mis remedios</h1>
    <div class="sub">Don Rigoberto · Instrucciones diarias</div>

    <div class="boton-audio" onclick="document.getElementById('audio1').play()">
        <div class="boton-titulo">📋 Instrucciones completas</div>
        <div class="boton-desc">Mañana y noche · dosis completa</div>
        <audio id="audio1" controls preload="metadata">
            <source src="audio_instrucciones_v1_2026-04-23.ogg" type="audio/ogg">
            Tu navegador no soporta audio.
        </audio>
    </div>

    <div class="boton-audio" onclick="document.getElementById('audio2').play()">
        <div class="boton-titulo">💊 Recordatorio farmacia</div>
        <div class="boton-desc">Fecha retiro · ubicación</div>
        <audio id="audio2" controls preload="metadata">
            <source src="audio_instrucciones_v2_2026-04-23.ogg" type="audio/ogg">
            Tu navegador no soporta audio.
        </audio>
    </div>

    <footer>Presiona el botón o el reproductor 🔈</footer>
</div>
<script>
    document.querySelectorAll('.boton-audio').forEach(boton => {
        const audio = boton.querySelector('audio');
        if(audio) {
            boton.addEventListener('click', (e) => {
                if(e.target.tagName !== 'AUDIO' && e.target.tagName !== 'SOURCE') {
                    audio.play();
                }
            });
        }
    });
</script>
</body>
</html>
