<script>
// ═══════════════════════════════════════════════════════════════

const RF_CONFIG = {

// Estado global del flujo
let rfState = {};
let rfCatalogoPrecios = null;   // Cargado desde Supabase

const rfChat = document.getElementById('rf-bot-chat');

const rfToggle = document.getElementById('rf-bot-toggle');
const rfToggleIcon = document.getElementById('rf-bot-toggle-icon');

// ═══════════════════════════════════════════════════════════════
// TOGGLE WIDGET
// ═══════════════════════════════════════════════════════════════
function rfBotToggle() {
  const isOpen = rfWindow.classList.toggle('open');
  rfToggle.classList.toggle('open', isOpen);
  rfToggleIcon.textContent = isOpen ? '✕' : '💬';
  if (isOpen && rfChat.children.length === 0) {
    rfAddDate();
    setTimeout(rfNodo1, 400);
  }
  // Comunicar al parent window (para embed iframe cross-origin)
  try {
    window.parent.postMessage({
      type: 'rf-chatbot-v2',
      action: isOpen ? 'open' : 'close',
      version: RF_CONFIG.VERSION
    }, '*');
  } catch(e) { /* ignore si no hay parent */ }
}

function rfReset() {
  rfChat.innerHTML = '';
  rfState = {};
  rfAddDate();
  setTimeout(rfNodo1, 300);
}

// ═══════════════════════════════════════════════════════════════
// UTILIDADES UI
// ═══════════════════════════════════════════════════════════════
function rfTime() {
  const n = new Date();
  return n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}

function rfScroll() {
  setTimeout(() => { rfChat.scrollTop = rfChat.scrollHeight; }, 60);
}

function rfAddDate() {
  const d = document.createElement('div');
  d.className = 'rf-datesep';
  d.innerHTML = '<span>Hoy</span>';
  rfChat.appendChild(d);
}

function rfAddTyping() {
  const div = document.createElement('div');
  div.className = 'rf-bot-msg';
  div.id = 'rf-typing-indicator';
  div.innerHTML = '<div class="rf-typing"><div class="rf-dot"></div><div class="rf-dot"></div><div class="rf-dot"></div></div>';
  rfChat.appendChild(div);
  rfScroll();
}

function rfRemoveTyping() {
  const t = document.getElementById('rf-typing-indicator');
  if (t) t.remove();
}

function rfAddBotMsg(html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      rfRemoveTyping();
      const wrap = document.createElement('div');
      wrap.className = 'rf-bot-msg';
      wrap.innerHTML = '<div><div class="rf-bot-bubble">'+html+'</div><div class="rf-bot-time">'+rfTime()+'</div></div>';
      rfChat.appendChild(wrap);
      rfScroll();
      resolve();
    }, delay);
  });
}

function rfAddUserMsg(text) {
  document.querySelectorAll('.rf-opt-btn').forEach(b => b.classList.add('rf-disabled'));
  const wrap = document.createElement('div');
  wrap.className = 'rf-user-msg';
  wrap.innerHTML = '<div><div class="rf-user-bubble">'+text+'</div><div class="rf-user-time">'+rfTime()+' ✓✓</div></div>';
  rfChat.appendChild(wrap);
  rfScroll();
}

function rfAddOptions(opts) {
  const container = document.createElement('div');
  container.className = 'rf-options';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'rf-opt-btn';
    btn.textContent = o.label;
    btn.onclick = () => o.action();
    container.appendChild(btn);
  });
  rfChat.appendChild(container);
  rfScroll();
}

async function rfBotSequence(messages, thenFn, instant=false) {
  for (let i = 0; i < messages.length; i++) {
    if (!instant) {
      rfAddTyping();
      await new Promise(r => setTimeout(r, 800 + Math.random()*300));
      rfRemoveTyping();
    }
    await rfAddBotMsg(messages[i], 0);
    if (!instant && i < messages.length - 1) await new Promise(r => setTimeout(r, 250));
  }
  if (thenFn) thenFn();
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE · Cargar catálogo de precios en vivo
// ═══════════════════════════════════════════════════════════════
async function rfFetchPrecios() {
  try {
    const r = await fetch(RF_CONFIG.SUPABASE_URL + '/rest/v1/asistente_snapshot?id=eq.1&select=datos,version_label,actualizado_en', {
      headers: { 'apikey': RF_CONFIG.SUPABASE_KEY, 'Authorization': 'Bearer ' + RF_CONFIG.SUPABASE_KEY }
    });
    const rows = await r.json();
    const row = rows && rows[0];
    if (row && row.datos) {
      rfCatalogoPrecios = row.datos;
      rfCatalogoFecha = row.actualizado_en;
      return true;
    }
  } catch(e) { console.warn('[RF Chatbot] No pudo cargar catálogo:', e); }
  return false;
}

// Busca precio_lista de un material específico, en una sucursal específica
// Devuelve el precio o null si no hay match
function rfGetPrecio(nombreMaterial, sucursal, empresaFilter) {
  if (!rfCatalogoPrecios) return null;
  const lista = rfCatalogoPrecios[sucursal] || rfCatalogoPrecios['Cerrillos'] || [];
  // Busca por nombre exacto, case-insensitive
  const match = lista.find(m => {
    if (empresaFilter === 'farex' && !m.farex) return false;
    if (empresaFilter === 'reciclean' && !m.reciclean) return false;
    return m.material && m.material.toLowerCase() === nombreMaterial.toLowerCase();
  });
  return match && match.precioLista > 0 ? match.precioLista : null;
}

// Lista top N materiales de una empresa en una sucursal, ordenados por precio descendente
function rfTopMateriales(empresa, sucursal, topN) {
  if (!rfCatalogoPrecios) return [];
  const lista = rfCatalogoPrecios[sucursal] || rfCatalogoPrecios['Cerrillos'] || [];
  return lista
    .filter(m => m[empresa] && m.precioLista > 0)
    .sort((a,b) => b.precioLista - a.precioLista)
    .slice(0, topN || 20);
}

function rfFmtPrecio(v) {
  return v ? '$' + Math.round(v).toLocaleString('es-CL') + '/kg' : 'consultar';
}

// N3A-M · Fierro y Metales Farex (tabla dinámica desde Supabase)
// ═══════════════════════════════════════════════════════════════
function rfNodo3am() {
  const sucursal = rfState.sucursal || 'Cerrillos';
  const top = rfTopMateriales('farex', sucursal, 15);

  let html = '<div class="rf-precio-tabla">';
  html += '<div class="rf-pt-title">🔧 Metales y Fierros · ' + sucursal + '</div>';
  html += '<div class="rf-pt-fecha">' + new Date().toLocaleDateString('es-CL') + ' · precios en vivo</div>';

  // Agrupar por categoría
  const grupos = {};
  top.forEach(m => {
    if (!grupos[m.categoria]) grupos[m.categoria] = [];
    grupos[m.categoria].push(m);
  });
  Object.keys(grupos).forEach(cat => {
    html += '<div class="rf-pt-section">' + cat + '</div>';
    grupos[cat].forEach(m => {
      html += '<div class="rf-pt-row"><span>' + m.material + '</span><span class="rf-pt-val">' + rfFmtPrecio(m.precioLista) + '</span></div>';
    });
  });
  html += '</div>';

  if (top.length === 0) {
    html = '<div style="color:#fb923c">No hay precios disponibles en este momento. Por favor contacta a un ejecutivo.</div>';
  }

  rfBotSequence([html], () => {
    rfAddOptions([
      { label:'1. Continuar — me interesa vender ✅', action:()=>{
          rfAddUserMsg('Me interesa vender');
          rfState.material='metales varios';
          rfState.precio=null;
          rfNodo5a();
      }},
      { label:'2. Cotizar servicio de retiro', action:()=>{ rfAddUserMsg('Cotizar retiro'); rfNodo3c(); }},
      { label:'3. Volver al menú principal', action:()=>{ rfAddUserMsg('Volver al menú'); rfNodo1(); }}
    ]);
  });
}

// ═══════════════════════════════════════════════════════════════
// N7 · CIERRE · Genera WhatsApp deeplink con TODO el state pre-lleno
// ═══════════════════════════════════════════════════════════════
function rfGenerarMensajeWhatsApp() {
  const s = rfState;
  const intent_labels = {
    'vender_material': '💰 Quiero vender material',
    'cotizar_retiro':  '🚛 Cotizar retiro',
    'donar':           '💚 Quiero donar material',
    'meditar':         '🤔 Me gustaría que me contacten luego',
    'materiales_varios': '❓ Consulta materiales varios'
  };
  const header = intent_labels[s.intent] || '📩 Nueva consulta desde el chatbot web';

  let msg = '*' + header + '*\n\n';
  msg += '_Generado desde el chatbot de reciclean.cl_\n\n';

  if (s.ciudad)   msg += '📍 Ciudad: ' + s.ciudad + '\n';
  if (s.sucursal) msg += '📍 Sucursal: ' + s.sucursal + '\n';
  if (s.material) msg += '📦 Material: ' + s.material + '\n';
  if (s.empresa)  msg += '🏷 Empresa: ' + (s.empresa === 'farex' ? 'FAREX' : 'RECICLEAN') + '\n';
  if (s.precio)   msg += '💰 Precio lista: $' + Math.round(s.precio).toLocaleString('es-CL') + '/kg\n';
  if (s.modo_entrega) msg += '🚛 Modo entrega: ' + (s.modo_entrega === 'retiro' ? 'con retiro' : 'entrega propia') + '\n';

  msg += '\n— — — — —\n';
  msg += '*Datos pendientes de llenar:*\n\n';

  if (s.intent === 'vender_material' && s.modo_entrega === 'entrega_propia') {
    msg += '• Nombre y apellido: \n';
    msg += '• RUT: \n';
    msg += '• ¿Venta a nombre de empresa?: \n';
    msg += '• Correo: \n';
    msg += '• Día preferido: \n';
    msg += '• Jornada (AM/PM): \n';
  } else if (s.intent === 'cotizar_retiro') {
    msg += '• Nombre y apellido: \n';
    msg += '• Correo: \n';
    msg += '• Dirección retiro: \n';
    msg += '• Ubicación Google Maps: \n';
    msg += '• Tipo camión (pequeño/ampliroll/no sé): \n';
    msg += '• Kilos aproximados: \n';
    msg += '• ¿Grúa horquilla?: \n';
    msg += '• Día preferido: \n';
    msg += '• Jornada (AM/PM): \n';
    msg += '• Comentarios: \n';
    msg += '\n📸 Por favor adjunta 2 o más fotos del material.';
  } else if (s.intent === 'donar') {
    if (s.tipo_cliente === 'personal') {
      msg += '• Nombre y apellido: \n';
      msg += '• Kilos aproximados: \n';
      msg += '• Día preferido: \n';
      msg += '• Jornada (AM/PM): \n';
    } else {
      msg += '• Nombre empresa: \n';
      msg += '• RUT empresa: \n';
      msg += '• Nombre y RUT de quien traerá el material: \n';
      msg += '• Cargo: \n';
      msg += '• Kilos aproximados: \n';
      msg += '• Día preferido: \n';
      msg += '• Jornada (AM/PM): \n';
      msg += '• Certificado REP Ley 20.920: ' + (s.requiere_cert_rep ? 'SÍ (valor 2,7 UF anuales)' : 'NO') + '\n';
      if (s.requiere_cert_rep) msg += '• Correo para el certificado: \n';
    }
  } else if (s.intent === 'meditar') {
    msg += '• Nombre y apellido: \n';
    msg += '• Canal preferido (WhatsApp / llamada): \n';
  } else if (s.intent === 'materiales_varios') {
    msg += '• Describe los materiales que tienes: \n';
    msg += '• Cantidad aproximada: \n';
    msg += '• Ciudad: \n';
  }

  msg += '\n_Gracias por contactarnos 💚_';
  return msg;
}

function rfNodo7() {
  // Generar WhatsApp deeplink
  const mensaje = rfGenerarMensajeWhatsApp();
  const waLink = 'https://wa.me/' + RF_CONFIG.WHATSAPP + '?text=' + encodeURIComponent(mensaje);

  rfBotSequence([
    '✅ <b>¡Listo!</b> Reúne los datos que te pedí y presiona el botón de abajo para enviarlos directamente a Andrea por WhatsApp (ya vienen pre-cargados).\n\nAndrea te responderá a la brevedad con la información o cotización.'
  ], () => {
    // Agregar botón CTA de WhatsApp directo
    const wrap = document.createElement('div');
    wrap.className = 'rf-bot-msg';
    wrap.style.maxWidth = '92%';
    wrap.innerHTML = '<div style="width:100%"><a href="' + waLink + '" target="_blank" class="rf-wa-cta"><span class="rf-wa-icon">💬</span>Abrir WhatsApp con datos pre-cargados</a></div>';
    rfChat.appendChild(wrap);
    rfScroll();

    setTimeout(() => {
      rfAddOptions([
        { label:'1. Volver al menú principal', action:()=>{ rfAddUserMsg('Volver al menú'); rfReset(); }},
        { label:'2. No, muchas gracias 👋', action:()=>{ rfAddUserMsg('Muchas gracias'); rfNodofin(); }}
      ]);
    }, 600);
  });
}

function rfNodofin() {
  rfBotSequence(['¡Hasta pronto! Cuando nos necesites, aquí estaremos. 👋♻']);
}
