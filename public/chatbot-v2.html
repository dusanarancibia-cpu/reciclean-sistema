#rf2-container, #rf2-container * { box-sizing:border-box; margin:0; padding:0; }

}

/* ═══ BOTÓN FLOTANTE ═══ */
#rf2-toggle {
  position:fixed; bottom:24px; right:24px; z-index:999998;
  width:64px; height:64px; border-radius:50%;
  background:transparent;
  border:none; cursor:pointer;
  box-shadow:0 8px 28px rgba(15,23,42,.35),0 2px 8px rgba(0,0,0,.2);
  display:flex; align-items:center; justify-content:center;
  transition:transform .25s,box-shadow .25s;
  overflow:hidden; padding:0;
}
#rf2-toggle img.rf2-toggle-logo { width:64px; height:64px; object-fit:cover; display:block; border-radius:50%; }
#rf2-toggle:hover { transform:scale(1.08); box-shadow:0 12px 32px rgba(15,23,42,.5); }
#rf2-toggle.open { filter:brightness(0.75); }
.rf2-pulse {
  position:absolute; inset:-4px; border-radius:50%;
  border:2px solid #10B981; opacity:0;
  animation:rf2Pulse 2.5s infinite;
}
@keyframes rf2Pulse { 0%{opacity:.7;transform:scale(1)} 100%{opacity:0;transform:scale(1.45)} }

/* ═══ VENTANA DEL CHAT ═══ */
#rf2-window {

  animation:rf2SlideUp .3s ease;
}

/* ═══════════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════════ */
function validarRut(rut) {
  if (!rut) return false;
  rut = rut.replace(/\s|\./g, '').toUpperCase().trim();
  if (!/^[0-9]{7,8}-[0-9K]$/.test(rut)) return false;
  const [nums, dv] = rut.split('-');
  const m = [2,3,4,5,6,7];
  let s = 0;
  for (let i = nums.length - 1, j = 0; i >= 0; i--, j++) {
    s += parseInt(nums[i]) * m[j % 6];
  }
  const r = 11 - (s % 11);
  const dvCalc = r === 11 ? '0' : r === 10 ? 'K' : String(r);
  return dvCalc === dv;
}

function formatearRut(rut) {
  rut = rut.replace(/\s|\./g, '').toUpperCase().trim();
  if (rut.length < 2) return rut;
  const cuerpo = rut.replace(/-/g,'');
  if (cuerpo.length < 2) return rut;
  const nums = cuerpo.slice(0, -1);
  const dv   = cuerpo.slice(-1);
  const formateado = nums.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return formateado + '-' + dv;
}

function validarEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email.trim());
}

function validarTelefono(tel) {
  const limpio = tel.replace(/[\s\-\(\)]/g,'');
  return /^(\+?56)?9\d{8}$/.test(limpio);
}

function generarOrden() {
  const ts = Date.now().toString(36).toUpperCase();
  const rand = Math.floor(Math.random() * 1000).toString().padStart(3,'0');
  const suc = (rfS.sucursal || 'RF').substring(0,2).toUpperCase();
  return `${suc}-${ts}-${rand}`;
}

function generarSession() {
  return 'ses_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

async function rfGetSnapshot() {
  try {
    const r = await fetch(
      `${RF2.SUPABASE_URL}/rest/v1/asistente_snapshot?id=eq.1&select=datos,version_label`,
      { headers: { apikey: RF2.SUPABASE_KEY, Authorization: 'Bearer ' + RF2.SUPABASE_KEY } }
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    return data[0]?.datos || null;
  } catch(e) {
    console.warn('[RF2] snapshot:', e.message);
    return null;
  }
}

// Normaliza texto: minúsculas + sin tildes + sin espacios extra
function rfNormalize(s) {
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

async function rfGetPrecio(material, sucursal, empresa) {
  if (!rfS._snapshot) rfS._snapshot = await rfGetSnapshot();
  const snap = rfS._snapshot;
  if (!snap || !snap[sucursal]) return null;
  const items = snap[sucursal];
  const term = rfNormalize(material);
  const item = items.find(i =>
    rfNormalize(i.material) === term ||
    rfNormalize(i.nombre)   === term
  );
  return item?.precioLista || item?.precio_lista || null;
}

function rfGenerarResumenTexto() {
  const s = rfS;
  let txt = `ORDEN ${s.numero_orden}\n`;
  txt += `Cliente: ${s.nombre} | RUT: ${s.rut} | Tel: ${s.telefono} | Email: ${s.email}\n`;
  if (s.nombre_empresa) txt += `Empresa: ${s.nombre_empresa} | RUT emp: ${s.rut_empresa}\n`;
  txt += `Sucursal: ${s.sucursal}\n`;

  // Si hay carrito (multi-material o metales) detallamos cada ítem a precio lista.
  // El precio ejecutivo final se acuerda al momento del pesaje.
  const carrito = Array.isArray(s.carrito) ? s.carrito : [];
  if (carrito.length > 0) {
    const { kgTotal, tramo, total } = rfCarritoTotalValor(carrito);
    const hayMetales = carrito.some(it => it.emp === 'farex');
    txt += `Materiales (${carrito.length}):\n`;
    carrito.forEach(it => {
      if (hayMetales && it.precioLista > 0) {
        const subtotal = it.precioLista * (parseFloat(it.kg) || 0);
        txt += `  - ${it.label}: ${it.kg} kg × $${it.precioLista.toLocaleString('es-CL')}/kg (lista) = $${subtotal.toLocaleString('es-CL')}\n`;
      } else {
        txt += `  - ${it.label}: ${it.kg} kg\n`;
      }
    });
    txt += `Total: ${kgTotal} kg (tramo ${tramo})`;
    if (hayMetales && total > 0) txt += ` ≈ $${total.toLocaleString('es-CL')} (precio lista)`;
    txt += `\n`;
  } else {
    txt += `Material: ${s.material} | Precio: $${(s.precio||0).toLocaleString('es-CL')}/kg | Kg aprox: ${s.kg_aproximados}\n`;
  }

  txt += `Día: ${s.dia_preferido} | Jornada: ${s.jornada}\n`;
  if (s.modo_entrega === 'retiro' || s.intent === 'retiro') {
    txt += `Dirección retiro: ${s.direccion}\n`;
    if (s.link_maps) txt += `Maps: ${s.link_maps}\n`;
    txt += `Camión: ${s.tipo_camion} | Grúa: ${s.grua_horquilla}\n`;
  }
  if (s.comentarios) txt += `Comentarios: ${s.comentarios}\n`;
  return txt;
}

function rfBotMsg(html, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const msg = $msgs();
      const typing = document.createElement('div');
      typing.className = 'rf2-msg-bot';
      typing.innerHTML = '<div class="rf2-typing"><span></span><span></span><span></span></div>';
      msg.appendChild(typing);

        typing.remove();
        const el = document.createElement('div');
        el.className = 'rf2-msg-bot';
        el.innerHTML = `<div class="rf2-bubble">${html}</div>`;
        msg.appendChild(el);
        rfScroll();
        resolve();
      }, 800);
    }, delay);
  });
}

/* Muestra campo de input en el chat */
function rfShowInput(opts) {
  // opts: { label, placeholder, type, hint, validate, onSend }
  rfClearActions();
  const block = document.createElement('div');
  block.className = 'rf2-input-block';

  const lbl = document.createElement('span');
  lbl.className = 'rf2-input-label';
  lbl.textContent = opts.label || '';
  block.appendChild(lbl);

  const row = document.createElement('div');
  row.className = 'rf2-input-row';

  let input;
  if (opts.type === 'select') {
    input = document.createElement('select');
    input.className = 'rf2-input';
    const dflt = document.createElement('option');
    dflt.value = ''; dflt.textContent = opts.placeholder || 'Seleccionar...'; dflt.disabled = true; dflt.selected = true;
    input.appendChild(dflt);
    (opts.options || []).forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.value || o; opt.textContent = o.label || o;
      input.appendChild(opt);
    });
  } else if (opts.type === 'textarea') {
    input = document.createElement('textarea');
    input.className = 'rf2-input';
    input.placeholder = opts.placeholder || '';
    input.rows = 3;
  } else {
    input = document.createElement('input');
    input.className = 'rf2-input';
    input.type = opts.type || 'text';
    input.placeholder = opts.placeholder || '';
    if (opts.maxlength) input.maxLength = opts.maxlength;
  }

  const hint = document.createElement('div');
  hint.className = 'rf2-input-hint';

  const btn = document.createElement('button');
  btn.className = 'rf2-btn-send';
  btn.textContent = '→';
  btn.disabled = true;

  // Validación en tiempo real
  const validate = () => {
    const val = input.value.trim();
    if (!val) { btn.disabled = true; input.className = 'rf2-input'; hint.textContent = ''; hint.className = 'rf2-input-hint'; return; }
    if (opts.validate) {
      const res = opts.validate(val);
      if (res === true) {
        input.className = 'rf2-input valid'; hint.className = 'rf2-input-hint ok'; hint.textContent = opts.hintOk || '✓'; btn.disabled = false;
      } else {
        input.className = 'rf2-input invalid'; hint.className = 'rf2-input-hint err'; hint.textContent = res || 'Valor inválido'; btn.disabled = true;
      }
    } else {
      btn.disabled = val.length === 0;
      if (val.length > 0) input.className = 'rf2-input valid';
    }
  };

  input.addEventListener('input', validate);
  if (opts.type === 'select') {
    input.addEventListener('change', () => { btn.disabled = !input.value; });
    btn.disabled = false; // allow after selection
  }

  const send = () => {
    const val = input.value.trim();
    if (!val && opts.required !== false) return;
    rfClearActions();
    rfUserMsg(opts.displayValue ? opts.displayValue(val) : val);
    opts.onSend(val);
  };

  btn.onclick = send;
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey && !btn.disabled) { e.preventDefault(); send(); }});

  row.appendChild(input);
  row.appendChild(btn);
  block.appendChild(row);
  block.appendChild(hint);
  $msgs().appendChild(block);
  rfScroll();

  // Formateo especial para RUT
  if (opts.formatRut) {
    input.addEventListener('blur', () => {
      const v = input.value.trim();
      if (v.length > 3) input.value = formatearRut(v);
      validate();
    });
  }

  setTimeout(() => input.focus(), 100);
  return block;
}

async function rfSubirFotoStorage(file, sessionId) {
  const ext    = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g,'');
  const safeExt = ['jpg','jpeg','png','webp'].includes(ext) ? ext : 'jpg';
  const path   = `${sessionId}/${Date.now()}.${safeExt}`;
  const url    = `${RF2.SUPABASE_URL}/storage/v1/object/chatbot-fotos/${path}`;
  const r = await fetch(url, {
    method: 'POST',
    headers: {
      apikey:        RF2.SUPABASE_KEY,
      Authorization: 'Bearer ' + RF2.SUPABASE_KEY,
      'Content-Type': file.type || 'image/jpeg',
      'x-upsert':    'true'
    },
    body: file
  });
  if (!r.ok) {
    const txt = await r.text().catch(()=>'');
    throw new Error('upload ' + r.status + ' ' + txt.slice(0,120));
  }
  return `${RF2.SUPABASE_URL}/storage/v1/object/public/chatbot-fotos/${path}`;
}

  input.type   = 'file';
  input.accept = opts.accept || 'image/*';
  if (opts.capture) input.setAttribute('capture', opts.capture);
  input.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:6px;width:100%';

  const btnCam = document.createElement('button');
  btnCam.className = 'rf2-btn rf2-btn-primary rf2-btn-full';
  btnCam.textContent = opts.label || '📸 Tomar foto ahora';
  btnCam.onclick = (e) => { e.preventDefault(); input.click(); };

  const btnSkip = document.createElement('button');
  btnSkip.className = 'rf2-btn rf2-btn-secondary rf2-btn-full';
  btnSkip.textContent = opts.skipLabel || '⏭ Continuar sin foto';
  btnSkip.onclick = (e) => {
    e.preventDefault();
    rfClearActions();
    rfUserMsg('⏭ Continuar sin foto');
    opts.onSkip && opts.onSkip();

function rfShowError(msg, onRetry) {
  rfClearActions();
  const el = document.createElement('div');
  el.className = 'rf2-error-block';
  el.innerHTML = `😕 ${rfEsc(msg)}`;
  $msgs().appendChild(el);

  ]);

}

function rfFallbackWhatsapp() {
  rfClearActions();
  const msg = encodeURIComponent(`Hola, intenté cotizar desde el chatbot pero tuve un error. Detalle: ${rfS.material || ''} en ${rfS.sucursal || ''}`);
  window.open(`https://wa.me/${RF2.WHATSAPP}?text=${msg}`, '_blank');
}

function rfSetProgress(pct, label) {
  const fill = document.getElementById('rf2-progress-fill');
  const lbl  = document.getElementById('rf2-progress-label');
  if (fill) fill.style.width = pct + '%';
  if (lbl)  { lbl.textContent = label || ''; lbl.style.display = label ? 'block' : 'none'; }
}

function rfTrack(nodo) {
  rfS.nodos.push({ nodo, ts: Date.now() });
}

function rfScroll() {
  const m = $msgs();
  if (m) m.scrollTop = m.scrollHeight + 200;
}

function rfEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* Secuencia de mensajes del bot con delays */
async function rfSeq(mensajes, finalFn) {
  for (let i = 0; i < mensajes.length; i++) {
    await rfBotMsg(mensajes[i], i === 0 ? 0 : 300);
  }
  if (finalFn) finalFn();
}

/* ═══ HELPERS DE NEGOCIACIÓN ═══ */
function rfRedondear(valor) {
  if (valor < 100)  return Math.round(valor);           // $1 para precios bajos
  if (valor < 1000) return Math.round(valor / 10) * 10; // $10 para medios
  return Math.round(valor / 50) * 50;                   // $50 para altos
}

function rfPrecioEjecutivo(lista, kgStr) {
  const factores = {
    'menos de 10 kg': 1.00,
    '10–50 kg':       1.05,
    '50–200 kg':      1.10,
    '200–500 kg':     1.15,
    'más de 500 kg':  1.20
  };
  const f = factores[kgStr] || 1.0;
  return rfRedondear(lista * f);
}

function rfPrecioMaximo(lista) {
  return rfRedondear(lista * 1.20);
}

function rfEstimarKgNum(kgStr) {
  return { 'menos de 10 kg':5, '10–50 kg':30, '50–200 kg':100, '200–500 kg':300, 'más de 500 kg':600 }[kgStr] || 50;
}

/* ═══ HELPERS DE CARRITO MULTI-MATERIAL (Fase 1 · 8 abril 2026) ═══ */

// Dado un número de kilos totales, devuelve el tramo estándar
function rfTramoPorKilos(kgTotal) {
  if (kgTotal < 10)   return 'menos de 10 kg';
  if (kgTotal < 50)   return '10–50 kg';
  if (kgTotal < 200)  return '50–200 kg';
  if (kgTotal < 500)  return '200–500 kg';
  return 'más de 500 kg';
}

// Suma los kilos de todos los items del carrito
function rfCarritoTotalKg(carrito) {
  return (carrito || []).reduce((sum, it) => sum + (parseFloat(it.kg) || 0), 0);
}

// Calcula el valor total del carrito a PRECIO LISTA (sin multiplicador).
// El precio ejecutivo se acuerda al momento del pesaje, no en el chat —
// el chatbot solo informa precio lista oficial farex.cl y el aproximado.
function rfCarritoTotalValor(carrito) {
  const kgTotal = rfCarritoTotalKg(carrito);
  const tramo   = rfTramoPorKilos(kgTotal);
  let total = 0;
  (carrito || []).forEach(it => {
    const precio = it.precioLista || 0;
    total += precio * (parseFloat(it.kg) || 0);
  });
  return { total, tramo, kgTotal };
}

// Si los kilos totales no llegan al tope (más de 500), devuelve cuántos kg
// faltan para alcanzar el siguiente umbral y el nombre del próximo tramo.
// Devuelve null si ya está en el tramo más alto.
function rfFaltanParaSiguienteTramo(kgTotal) {
  const umbrales = [10, 50, 200, 500];
  for (const u of umbrales) {
    if (kgTotal < u) {
      return { faltan: u - kgTotal, siguienteTramo: rfTramoPorKilos(u) };
    }
  }
  return null;
}

// Devuelve un resumen del carrito en HTML para mostrar en el chat.
// Si el carrito contiene metales Farex, muestra el precio lista oficial y el
// aproximado a precio lista. Para Reciclean los precios siguen ocultos hasta
// la negociación final.
function rfCarritoResumenHTML(carrito) {
  if (!carrito || !carrito.length) return '<em>Carrito vacío</em>';
  const { kgTotal, tramo, total } = rfCarritoTotalValor(carrito);
  const hayMetales = carrito.some(it => it.emp === 'farex');
  const mostrarPrecios = hayMetales;

  let html = '<div style="background:#0f1b22;border:1px solid rgba(134,239,172,.3);border-radius:12px;padding:12px;margin:6px 0">';
  html += '<div style="color:#86efac;font-weight:700;margin-bottom:8px">📋 Tu cotización</div>';
  carrito.forEach((it) => {
    const precioLista = it.precioLista || 0;
    const subtotal = precioLista * (parseFloat(it.kg) || 0);
    if (mostrarPrecios && precioLista > 0) {
      html += `<div style="padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.08);font-size:13px">
                 <div style="display:flex;justify-content:space-between;align-items:center">
                   <span>${rfEsc(it.label)}</span>
                   <span style="color:#86efac;font-weight:600">${it.kg} kg</span>
                 </div>
                 <div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(233,237,239,.65);margin-top:2px">
                   <span>$${precioLista.toLocaleString('es-CL')}/kg</span>
                   <span>$${subtotal.toLocaleString('es-CL')}</span>
                 </div>
               </div>`;
    } else {
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px dashed rgba(255,255,255,.08);font-size:13px">
                 <span>${rfEsc(it.label)}</span>
                 <span style="color:#86efac;font-weight:600">${it.kg} kg</span>
               </div>`;
    }
  });
  html += `<div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:2px solid rgba(134,239,172,.25);font-weight:700">
             <span>Total:</span>
             <span style="color:#22c55e;font-size:16px">${kgTotal} kg</span>
           </div>`;
  if (mostrarPrecios && total > 0) {
    html += `<div style="display:flex;justify-content:space-between;margin-top:4px;font-weight:800">
               <span style="color:#fbbf24">Aprox a precio lista:</span>
               <span style="color:#fbbf24;font-size:17px">$${total.toLocaleString('es-CL')}</span>
             </div>`;
  }
  html += `<div style="text-align:center;margin-top:6px;color:#fbbf24;font-size:11px">🎯 Volumen total: <strong>${kgTotal} kg</strong> · tramo <strong>${tramo}</strong>${mostrarPrecios ? ' · Precios oficiales farex.cl' : ''}</div>`;

  // Mensaje de upsell honesto: si no está en el tope, sugerir agregar más kilos
  // para acceder a un mejor precio al momento del pesaje (no calculamos cuánto).
  if (mostrarPrecios) {
    const sig = rfFaltanParaSiguienteTramo(kgTotal);

/* ═══ TABLA DE PRECIOS POR FAMILIA (feat 8 abril 2026) ═══
   Lee el snapshot Supabase y renderiza una tabla estilo farex.cl
   dentro del chat. Cada fila es tappable y agrega el material al
   carrito (reusa rfNodoCarritoKilos). */

// Devuelve los items de una categoría con su precio lista leído del snapshot.
// Filtra los que no tengan precio (>0). Si el snapshot aún no está cargado,
// intenta cargarlo sincrónicamente (await).
async function rfGetPreciosCategoria(cat, sucursal) {
  if (!rfS._snapshot) rfS._snapshot = await rfGetSnapshot();
  const snap = rfS._snapshot;
  if (!snap || !snap[sucursal]) return [];
  const items = snap[sucursal];
  return cat.items.map(it => {
    const term = rfNormalize(it.can);
    const row = items.find(r =>
      rfNormalize(r.material || '') === term ||
      rfNormalize(r.nombre   || '') === term
    );
    const precio = row?.precioLista || row?.precio_lista || 0;
    return { ...it, precio };
  }).filter(it => it.precio > 0);
}

// Renderiza la tabla de precios como HTML (para insertarlo dentro de rfBotMsg).
// Cada fila trae onclick que llama a la función global window.rf2AddMetal.
function rfTablaPreciosHTML(cat, items, sucursal) {
  const yaEnCarrito = new Set((rfS.carrito || []).filter(it => it.emp === 'farex').map(it => it.can));
  let html = '<div class="rf2-tabla-precios">';
  html += `<div class="rf2-tabla-header"><span>${cat.label}</span><span class="rf2-tabla-suc">Farex ${rfEsc(sucursal)}</span></div>`;
  items.forEach(it => {
    const yaEsta = yaEnCarrito.has(it.can);
    const precioFmt = '$' + it.precio.toLocaleString('es-CL');
    const canAttr = rfEsc(it.can).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const labelAttr = rfEsc(it.label).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    html += `<div class="rf2-tabla-row${yaEsta ? ' rf2-ya-en-carrito' : ''}" onclick="window.rf2AddMetal('${canAttr}','${labelAttr}')">
      <span class="rf2-tabla-label">${rfEsc(it.label)}</span>
      <span class="rf2-tabla-precio">${precioFmt}/kg</span>
      <button class="rf2-tabla-add" tabindex="-1">${yaEsta ? '' : 'añadir'}</button>
    </div>`;
  });
  html += '<div class="rf2-tabla-footer">Precio de mercado, siempre actualizados · IVA 19% retención con factura de compra · Pago con transferencia bancaria y Acta de procedencia</div>';
  html += '</div>';
  return html;
}

// Hook global para que los onclick de la tabla puedan disparar el flujo de kg.

// Resumen final para entrega propia post-acuerdo
async function rfNodoResumenFinal() {
  rfTrack('N-resumen-final');
  rfSetProgress(90);
  await rfBotMsg('¡Casi listo! Revisa el resumen antes de confirmar 👇');

  const filas = [
    ['Nombre',        rfS.nombre],
    ['RUT',           rfS.rut],
    ['Email',         rfS.email],
    ['Teléfono',      rfS.telefono],
    ['Empresa',       rfS.nombre_empresa],
    ['RUT empresa',   rfS.rut_empresa],
    ['Sucursal',      rfS.sucursal],
  ];

  // Si hay carrito (multi-material o metales), detallamos cada ítem.
  // Para metales (Farex) mostramos precio LISTA + subtotal a precio lista.
  // El precio ejecutivo final se acuerda al momento del pesaje.
  const carrito = Array.isArray(rfS.carrito) ? rfS.carrito : [];
  if (carrito.length > 0) {
    const { kgTotal, tramo, total } = rfCarritoTotalValor(carrito);
    const hayMetales = carrito.some(it => it.emp === 'farex');
    carrito.forEach(it => {
      if (hayMetales && it.precioLista > 0) {
        const subtotal = it.precioLista * (parseFloat(it.kg) || 0);
        filas.push([it.label, `${it.kg} kg · $${it.precioLista.toLocaleString('es-CL')}/kg = $${subtotal.toLocaleString('es-CL')}`]);
      } else {
        filas.push([it.label, `${it.kg} kg`]);
      }
    });
    filas.push(['Total kg', `${kgTotal} kg (tramo ${tramo})`]);
    if (hayMetales && total > 0) {
      filas.push(['Aprox. a precio lista', `$${total.toLocaleString('es-CL')}`]);
    }
  } else {
    filas.push(['Material', rfS.material]);
    filas.push(['Precio acordado', rfS.precio ? `$${rfS.precio.toLocaleString('es-CL')}/kg` : 'a confirmar']);
    filas.push(['Kg aprox.', rfS.kg_aproximados]);
  }

  filas.push(['Día',     rfS.dia_preferido]);
  filas.push(['Jornada', rfS.jornada]);

  rfShowResumen(filas,
    () => rfNodoEnviar('confirmada'),
    () => { rfClearActions(); rfNodoDatosContacto(); }
  );
}

async function rfNodoCarritoKilos(mat) {
  rfTrack('N-carrito-kilos');
  if (!Array.isArray(rfS.carrito)) rfS.carrito = [];
  rfSetProgress(35);
  await rfBotMsg(`¿Cuántos kilos aproximados de <strong>${mat.label}</strong> tienes?<br><span class="rf2-note">Escribe solo el número, ej: 30</span>`);
  rfShowInput({
    placeholder: 'Ej: 30',
    type: 'number',
    validate: (val) => {
      const n = parseFloat(val);
      if (isNaN(n) || n <= 0) return 'Ingresa un número mayor a 0';
      if (n > 100000)          return 'Número demasiado grande, revisalo';
      return true;
    },
    hintOk: '✓ Listo',
    onSend: async (val) => {
      const kg = parseFloat(val);
      // Busca precio lista en snapshot
      const precio = await rfGetPrecio(mat.can, rfS.sucursal, mat.emp);
      // Si el material ya estaba en el carrito (mismo can+emp), reemplaza los kg
      const idxExistente = rfS.carrito.findIndex(it => it.can === mat.can && it.emp === mat.emp);
      const nuevoItem = {
        label:       mat.label,
        can:         mat.can,
        emp:         mat.emp,
        kg:          kg,
        precioLista: precio || 0
      };
      if (idxExistente >= 0) {
        rfS.carrito[idxExistente] = nuevoItem;
      } else {
        rfS.carrito.push(nuevoItem);
      }
      rfClearActions();
      await rfBotMsg(`Agregado: <strong>${mat.label}</strong> — ${kg} kg ✅`);
      // Vuelve al origen del que vino el material para que la UX sea coherente:
      // tabla de metales → menú de familias; cualquier otro → selector principal.
      if (mat.origen === 'metales') {
        rfNodoMetalesCat();
      } else {
        rfNodo3A();
      }
    }
  });
}

async function rfNodoCarritoResumen() {
  rfTrack('N-carrito-resumen');
  if (!Array.isArray(rfS.carrito)) rfS.carrito = [];
  rfSetProgress(40);

  if (rfS.carrito.length === 0) {
    await rfBotMsg('No hay materiales registrados 😅');
    return rfNodo3A();
  }

  await rfBotMsg(rfCarritoResumenHTML(rfS.carrito));

  const kgTotal = rfCarritoTotalKg(rfS.carrito);
  const { total } = rfCarritoTotalValor(rfS.carrito);

  // Setea los campos principales de rfS para el flujo posterior
  rfS.material = rfS.carrito.map(it => `${it.label} (${it.kg}kg)`).join(', ');
  rfS.kg_aproximados = `${kgTotal} kg (multi-material)`;
  rfS.empresa  = rfS.carrito.some(it => it.emp === 'farex') ? 'farex' : 'reciclean';
  rfS.precio_lista = Math.round(total / Math.max(kgTotal, 1));
  rfS.precio       = rfS.precio_lista;

  // Pregunta frecuencia antes de mostrar las opciones de cierre
  await rfBotMsg('¿Con qué frecuencia podés vendernos estos materiales?');
  rfShowBtns([
    { label: '1️⃣ Solo una vez', fn: async () => { rfS.frecuencia = 'Una vez';  await rfMostrarOpcionesResumen(); } },
    { label: '📅 Mensual',      fn: async () => { rfS.frecuencia = 'Mensual';  await rfMostrarOpcionesResumen(); } },
    { label: '🗓️ Semanal',     fn: async () => { rfS.frecuencia = 'Semanal';  await rfMostrarOpcionesResumen(); } },
    { label: '🔥 Diaria',      fn: async () => { rfS.frecuencia = 'Diaria';   await rfMostrarOpcionesResumen(); } },
  ]);
}

// Muestra el mensaje de upsell genérico y los 3 botones de cierre.
async function rfMostrarOpcionesResumen() {
  rfSetProgress(50);
  await rfBotMsg(
    '💡 Si aumentás los kilos podemos evaluar un precio especial para vos. ¿Cómo querés seguir?'
  );
  rfShowBtns([
    { label: '✅ Sí, cerramos trato',   primary: true,    fn: rfNodoAcuerdo       },
    { label: '💬 Hablar con ejecutivo',              fn: rfNodoEjecutivoFoto  },
    { label: '✏️ Corregir datos',       secondary: true,  fn: rfNodo3A            },
  ]);
}

// Pide foto simple (sin código ni objeto de referencia) antes de derivar al ejecutivo.
async function rfNodoEjecutivoFoto() {
  rfTrack('N-ejecutivo-foto');
  rfSetProgress(55);
  await rfBotMsg(
    '¡Perfecto! Para que nuestro equipo te prepare la mejor oferta, ¿podés mandarme una foto del material? 📸' +
    '<br><span class="rf2-note">Es opcional pero nos ayuda mucho.</span>'
  );
  rfShowFileInput({
    label: '📸 Tomar foto del material',
    accept: 'image/*',
    capture: 'environment',
    skipLabel: '⏭ Continuar sin foto',
    onSelect: async (file) => {
      rfUserMsg('📸 Foto enviada');
      await rfBotMsg('Recibida, subiéndola... 📤');
      try {
        const url = await rfSubirFotoStorage(file, rfS.session_id);
        rfS.foto_url = url;
        await rfBotMsg('¡Foto guardada! ✅ El equipo la revisará antes de contactarte.');
      } catch(e) {
        console.error('[RF2] ejecutivo foto upload:', e.message);
        await rfBotMsg('No pude subir la foto 😕 pero seguimos igual.');
      }
      rfNodoDatosContacto();
    },
    onSkip: () => rfNodoDatosContacto()
  });
}

/* ═══════════════════════════════════════════════════════════════════
   PRUEBAS DE VALIDACIÓN Y ERROR (modo debug)
   Ejecutar rfRunTests() en la consola del navegador para validar
═══════════════════════════════════════════════════════════════════ */
function rfRunTests() {
  const tests = [
    // RUT válidos
    { desc:'RUT 15123456-3 válido',     fn: () => validarRut('15123456-3'),         expect: true  },
    { desc:'RUT con puntos válido',     fn: () => validarRut('15.123.456-3'),        expect: true  },
    { desc:'RUT 12345678-9',            fn: () => validarRut('12345678-9'),          expect: true  },
    { desc:'RUT con K válido',          fn: () => validarRut('5126663-K'),           expect: true  },
    // RUT inválidos
    { desc:'RUT dv incorrecto',         fn: () => validarRut('15123456-4'),          expect: false },
    { desc:'RUT muy corto',             fn: () => validarRut('123-4'),               expect: false },
    { desc:'RUT letras',                fn: () => validarRut('ABCDEFG-H'),           expect: false },
    { desc:'RUT vacío',                 fn: () => validarRut(''),                   expect: false },
    // Email
    { desc:'Email válido',              fn: () => validarEmail('a@b.cl'),            expect: true  },
    { desc:'Email sin @',               fn: () => validarEmail('notanemail'),        expect: false },
    { desc:'Email sin dominio',         fn: () => validarEmail('a@'),               expect: false },
    // Teléfono
    { desc:'Tel 912345678 válido',      fn: () => validarTelefono('912345678'),      expect: true  },
    { desc:'Tel +56912345678 válido',   fn: () => validarTelefono('+56912345678'),   expect: true  },
    { desc:'Tel 712345678 inválido',    fn: () => validarTelefono('712345678'),      expect: false },
    { desc:'Tel demasiado corto',       fn: () => validarTelefono('9123'),           expect: false },
    // Formato RUT
    { desc:'Formato 15123456-3',        fn: () => formatearRut('151234563'),         expect: '15.123.456-3' },
    { desc:'Formato 5126663-K',         fn: () => formatearRut('5126663K'),          expect: '5.126.663-K'  }
  ];

  let ok = 0, fail = 0;
  console.group('[RF2] Tests de validación');
  tests.forEach(t => {
    const result = t.fn();
    const pass = result === t.expect;
    console[pass ? 'log' : 'error'](`${pass ? '✅' : '❌'} ${t.desc} → ${result} (esperado: ${t.expect})`);
    pass ? ok++ : fail++;
  });
  console.groupEnd();
  console.log(`[RF2] Tests: ${ok} ✅  ${fail} ❌  Total: ${tests.length}`);

  // Test de conectividad Supabase
  console.log('[RF2] Testeando Supabase...');
  rfGetSnapshot().then(snap => {
    if (snap) {
      const suc = Object.keys(snap);
      console.log(`[RF2] ✅ Snapshot cargado. Sucursales: ${suc.join(', ')}`);
    } else {
      console.warn('[RF2] ⚠️ Snapshot no disponible. Verificar asistente_snapshot en Supabase.');
    }
  });
}

/* ═══════════════════════════════════════════════════════════════════
   MÉTRICAS / RESUMEN DE SESIÓN
═══════════════════════════════════════════════════════════════════ */
function rfGetSessionMetrics() {
  const duracion = Math.round((Date.now() - rfS.inicio) / 1000);
  return {
    session_id:       rfS.session_id,
    duracion_seg:     duracion,
    nodos_visitados:  rfS.nodos.map(n => n.nodo),
    total_nodos:      rfS.nodos.length,
    intent:           rfS.intent,
    sucursal:         rfS.sucursal,
    material:         rfS.material,
    convertido:       !!rfS.numero_orden,
    numero_orden:     rfS.numero_orden,
    abandono_en:      rfS.numero_orden ? null : (rfS.nodos[rfS.nodos.length-1]?.nodo || null),
    version:          RF2.VERSION
  };
}

/* ═══════════════════════════════════════════════════════════════════
   INICIALIZACIÓN
═══════════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const toggle = document.getElementById('rf2-toggle');
  const win    = document.getElementById('rf2-window');
  const close  = document.getElementById('rf2-close');

  toggle.addEventListener('click', () => {
    const isOpen = win.classList.contains('open');
    win.classList.toggle('open');
    toggle.classList.toggle('open');
    if (!isOpen) rfOnOpen();

    // Notifica iframe parent (para WPCode)
    try {
      window.parent.postMessage({ type:'rf-chatbot-v2', action: isOpen ? 'close' : 'open' }, '*');
    } catch(e) {}
  });

  close.addEventListener('click', () => {
    win.classList.remove('open');
    toggle.classList.remove('open');
    try { window.parent.postMessage({ type:'rf-chatbot-v2', action:'close' }, '*'); } catch(e) {}
  });

  // Pre-cargar snapshot en background
  rfGetSnapshot().then(snap => {
    if (snap) rfS._snapshot = snap;
  });

  console.log(`[RF2] Chatbot Reciclean-Farex v${RF2.VERSION} listo.`);
  console.log('[RF2] Para validar: rfRunTests()');
  console.log('[RF2] Para métricas: rfGetSessionMetrics()');
});

function rfOnOpen() {
  // Inicializar sesión nueva
  rfS = Object.assign({}, {
    intent:null, ciudad:null, sucursal:null, material:null, empresa:null,
    precio:null, precio_lista:null, modo_entrega:null, tipo_cliente:null,
    nombre:null, rut:null,
    email:null, telefono:null, nombre_empresa:null, rut_empresa:null, cargo:null,
    kg_aproximados:null, dia_preferido:null, jornada:null, direccion:null,
    link_maps:null, tipo_camion:null, grua_horquilla:null, comentarios:null,
    requiere_cert_rep:false,
    // Fase 1 · 8 abril 2026 — foto y carrito multi-material
    foto_url:null, foto_codigo:null, carrito:[],
    session_id: generarSession(), inicio: Date.now(),
    nodos:[], numero_orden:null, estado_envio:null, _snapshot: rfS._snapshot
  });

  $msgs().innerHTML = '';
  rfSetProgress(0);
  rfNodo1();
}
