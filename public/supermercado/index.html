<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#16a34a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Lista Supermercado</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
<style>
  :root{
    --bg:#f5f7fa;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
    --accent:#16a34a;
    --accent-light:#dcfce7;
    --accent-dark:#15803d;
    --lider:#0071ce;
    --lider-bg:#e0f2fe;
    --alvi:#e30613;
    --alvi-bg:#fee2e2;
    --warn-bg:#fef3c7;
    --warn-border:#f59e0b;
    --shadow:0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    font-size:16px;line-height:1.4}
  body{min-height:100vh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

  header{
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:#fff;padding:18px 20px;position:sticky;top:0;z-index:50;
    box-shadow:0 2px 8px rgba(0,0,0,.1)
  }
  header h1{margin:0;font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px}
  header .sub{font-size:13px;opacity:.85;margin-top:2px}

  .wrap{max-width:960px;margin:0 auto;padding:16px}

  .panel{background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
  .panel h2{margin:0 0 12px;font-size:15px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600}

  /* Supermercados */
  .supers{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .super{padding:12px;border-radius:10px;border:2px solid var(--border)}
  .super.a{border-color:var(--lider);background:var(--lider-bg)}
  .super.b{border-color:var(--alvi);background:var(--alvi-bg)}
  .super-name{font-weight:700;font-size:15px;margin-bottom:6px}
  .super-actions{display:flex;gap:6px;flex-wrap:wrap}
  .super-actions a{
    font-size:12px;padding:4px 10px;border-radius:20px;background:#fff;
    color:var(--text);text-decoration:none;border:1px solid rgba(0,0,0,.1);font-weight:500
  }
  .super-actions a:active{transform:scale(.95)}

  /* Totales */
  .totals{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .total-card{padding:14px;border-radius:10px;background:#f8fafc;border:1px solid var(--border)}
  .total-card.winner{background:var(--accent-light);border-color:var(--accent);border-width:2px}
  .total-card.lider{background:var(--lider-bg);border:1px solid var(--lider)}
  .total-card.alvi{background:var(--alvi-bg);border:1px solid var(--alvi)}
  .total-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .total-value{font-size:24px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}

  .progress-wrap{margin-top:14px}
  .progress{height:8px;background:#e2e8f0;border-radius:100px;overflow:hidden}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .3s}
  .progress-label{font-size:12px;color:var(--muted);margin-top:6px;text-align:center}

  /* Lista de productos - cards en móvil */
  .items{display:flex;flex-direction:column;gap:10px}
  .item{
    display:grid;grid-template-columns:auto 1fr auto;gap:12px;
    padding:14px;background:#fff;border:1px solid var(--border);border-radius:12px;
    transition:background .2s, opacity .2s;align-items:start
  }
  .item.done{background:#f1f5f9;opacity:.6}
  .item.done .item-name{text-decoration:line-through}

  .item-check{
    width:36px;height:36px;border:2px solid var(--border);border-radius:10px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;
    flex-shrink:0;transition:all .15s
  }
  .item-check.checked{background:var(--accent);border-color:var(--accent);color:#fff}
  .item-check.checked::before{content:"✓";font-size:22px;font-weight:800}
  .item-check:active{transform:scale(.9)}

  .item-body{min-width:0}
  .item-name{font-weight:600;font-size:16px;margin-bottom:4px;word-wrap:break-word}
  .item-name input{
    width:100%;border:none;background:transparent;font:inherit;color:inherit;
    padding:2px 0;border-bottom:1px dashed transparent
  }
  .item-name input:focus{outline:none;border-bottom-color:var(--accent)}

  .item-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:13px;color:var(--muted);align-items:center}
  .qty-ctrl{display:inline-flex;align-items:center;gap:4px;background:#f1f5f9;border-radius:20px;padding:2px}
  .qty-btn{
    width:28px;height:28px;border-radius:50%;border:none;background:#fff;
    font-weight:700;cursor:pointer;color:var(--text);font-size:16px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,.1)
  }
  .qty-btn:active{transform:scale(.9)}
  .qty-value{min-width:24px;text-align:center;font-weight:700;color:var(--text)}

  .prices{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
  .price{
    padding:8px 10px;border-radius:8px;background:#f8fafc;font-size:13px;
    display:flex;justify-content:space-between;align-items:center;gap:6px;border:1px solid var(--border)
  }
  .price.lider{background:var(--lider-bg);border-color:#bae6fd}
  .price.alvi{background:var(--alvi-bg);border-color:#fecaca}
  .price.cheapest{border-width:2px;border-color:var(--accent)}
  .price-label{font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px}
  .price-label .star{color:var(--accent);font-size:14px}
  .price input{
    width:80px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;
    background:#fff;font:inherit;font-size:13px;text-align:right;font-variant-numeric:tabular-nums
  }

  .item-right{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
  .subtotal{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .search-btns{display:flex;gap:4px;margin-top:4px}
  .search-btns a{
    padding:4px 8px;border-radius:14px;font-size:11px;text-decoration:none;
    font-weight:600;white-space:nowrap
  }
  .search-btns a.lider{background:var(--lider);color:#fff}
  .search-btns a.alvi{background:var(--alvi);color:#fff}
  .delete-btn{background:none;border:none;color:#cbd5e1;font-size:20px;cursor:pointer;padding:4px}
  .delete-btn:active{color:#ef4444}

  /* Botones */
  .btn{
    padding:12px 18px;background:var(--accent);color:#fff;border:none;border-radius:10px;
    cursor:pointer;font-weight:600;font-size:15px;font-family:inherit;
    display:inline-flex;align-items:center;gap:8px;transition:transform .1s
  }
  .btn:active{transform:scale(.97)}
  .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
  .btn.danger{background:#fff;color:#dc2626;border:1px solid #fecaca}
  .btn.big{padding:16px 24px;font-size:17px;width:100%;justify-content:center}
  .btn.block{width:100%;justify-content:center}

  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .actions.stack > *{flex:1;min-width:140px}

  .export-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}

  .note{
    font-size:13px;color:#92400e;padding:10px 12px;background:var(--warn-bg);
    border-left:4px solid var(--warn-border);border-radius:6px;margin-top:10px
  }

  /* Layout desktop */
  @media(min-width:720px){
    .item{grid-template-columns:auto 2fr 1fr auto}
    .prices{grid-template-columns:1fr 1fr;margin-top:0}
    .item-body{grid-column:2/3}
    .item .prices{grid-column:3/4}
    .item-right{grid-column:4/5}
  }

  /* Móvil pequeño */
  @media(max-width:480px){
    header h1{font-size:18px}
    .wrap{padding:12px}
    .panel{padding:14px}
    .total-value{font-size:20px}
  }

  /* Print: lindo y centrado en A4 */
  @media print{
    @page{size:A4;margin:15mm}
    body{background:#fff;color:#000}
    header,.no-print,.btn,.search-btns,.delete-btn,.qty-btn{display:none !important}
    .panel{box-shadow:none;border:none;padding:0;margin-bottom:10mm}
    .wrap{padding:0;max-width:100%}
    .item{break-inside:avoid;page-break-inside:avoid;border:1px solid #ccc !important;background:#fff !important;opacity:1 !important}
    .item.done{background:#f5f5f5 !important}
    .item-check{border:2px solid #333 !important}
    .price{background:#fff !important;border:1px solid #ccc !important}
    .price.cheapest{border:2px solid #16a34a !important;background:#f0fdf4 !important}
    .price input{border:none !important;background:transparent !important}
    .totals{display:grid !important}
    .total-card{background:#f9f9f9 !important;border:1px solid #ccc !important}
    .total-card.winner{background:#dcfce7 !important;border:2px solid #16a34a !important}
  }
</style>
</head>
<body>

<header>
  <h1>🛒 Lista de compras</h1>
  <div class="sub" id="dateSub"></div>
</header>

<div class="wrap">

  <section class="panel no-print">
    <h2>Supermercados</h2>
    <div class="supers">
      <div class="super a">
        <div class="super-name" id="supAName">Líder Central</div>
        <div class="super-actions">
          <a id="mapA" target="_blank" rel="noopener">📍 Mapa</a>
          <a id="webA" target="_blank" rel="noopener">🌐 Web</a>
        </div>
      </div>
      <div class="super b">
        <div class="super-name" id="supBName">Alvi Plaza Maipú</div>
        <div class="super-actions">
          <a id="mapB" target="_blank" rel="noopener">📍 Mapa</a>
          <a id="webB" target="_blank" rel="noopener">🌐 Web</a>
        </div>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>Totales</h2>
    <div class="totals" id="totals"></div>
    <div class="progress-wrap">
      <div class="progress"><div id="progressBar" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 de 0 productos en el carro</div>
    </div>
  </section>

  <section class="panel">
    <h2>Productos</h2>
    <div class="items" id="items"></div>
    <div class="actions" style="margin-top:14px">
      <button id="btnAdd" class="btn secondary">+ Agregar producto</button>
      <button id="btnClearCart" class="btn secondary no-print">Desmarcar todos</button>
    </div>
  </section>

  <section class="panel no-print">
    <h2>Compartir e imprimir</h2>
    <button id="btnShare" class="btn big" style="margin-bottom:10px">📤 Compartir PDF por WhatsApp</button>
    <div class="export-grid">
      <button id="btnPdf" class="btn secondary block">📄 Descargar PDF</button>
      <button id="btnPrint" class="btn secondary block">🖨️ Imprimir</button>
      <button id="btnPptx" class="btn secondary block">📊 PPTX</button>
      <button id="btnReset" class="btn danger block">⟲ Resetear</button>
    </div>
    <div class="note">
      Los precios son referenciales abril 2026. Tocá
      <span style="background:#0071ce;color:#fff;padding:2px 6px;border-radius:10px;font-size:11px">Líder</span>
      o
      <span style="background:#e30613;color:#fff;padding:2px 6px;border-radius:10px;font-size:11px">Alvi</span>
      en cada producto para verificar el precio en la web.
    </div>
  </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="./app.js"></script>
</body>
</html>
